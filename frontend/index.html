<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdClear AI – Goa Smart Tourism</title>
    <meta name="description" content="Check real-time crowd levels at Goa beaches and tourist spots, get AI-powered suggestions and navigate to less-crowded alternatives.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.1);
            --accent: #4f8ef7;
            --accent-glow: rgba(79,142,247,0.35);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.35);
            --orange: #f59e0b;
            --orange-glow: rgba(245,158,11,0.35);
            --red: #ef4444;
            --red-glow: rgba(239,68,68,0.35);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,142,247,0.15), transparent);
        }

        /* ── NAV ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,14,26,0.8);
        }
        .nav-logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--accent); }
        .nav-user {
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-dropdown-container {
            position: relative;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
        }
        .nav-user {
            padding: 6px 12px 6px 6px;
            border-radius: 50px;
            transition: background 0.2s;
        }
        .user-dropdown-container:hover .nav-user {
            background: rgba(255, 255, 255, 0.05);
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(20, 25, 40, 0.95);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 8px;
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 200;
        }
        .user-dropdown-container:focus-within .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            font-family: inherit;
            text-align: left;
        }
        .dropdown-item:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.15;
            margin-bottom: 12px;
        }
        .hero h1 span { color: var(--accent); }
        .hero p { color: var(--muted); font-size: 1.05rem; max-width: 500px; margin: 0 auto 36px; }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 8px 8px 20px;
            backdrop-filter: blur(16px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-bar input {
            flex: 1; border: none; background: transparent;
            color: var(--text); font-size: 1rem; font-family: 'Inter', sans-serif;
            outline: none;
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 26px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .search-bar button:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
        .search-bar button:active { transform: translateY(0); }
        .search-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MAIN LAYOUT ── */
        main { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }

        /* ── GLASS CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            backdrop-filter: blur(16px);
            margin-bottom: 20px;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card:hover { border-color: rgba(255,255,255,0.15); }

        /* ── CROWD BADGE ── */
        .crowd-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .crowd-headline { font-size: 1.2rem; font-weight: 600; line-height: 1.4; flex: 1; }
        .crowd-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-low    { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
        .badge-medium { background: rgba(245,158,11,0.15); color: var(--orange); border: 1px solid rgba(245,158,11,0.3); }
        .badge-high   { background: rgba(239,68,68,0.15);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
        .badge-error  { background: rgba(239,68,68,0.1);   color: var(--red);    border: 1px solid rgba(239,68,68,0.2); }

        /* ── CROWD DESCRIPTION ── */
        .crowd-desc { color: var(--muted); font-size: 0.95rem; line-height: 1.65; margin-bottom: 20px; }

        /* ── FEATURE GRID ── */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        @media (max-width: 550px) { .features-grid { grid-template-columns: 1fr; } }
        .feature-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .feature-item h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .feature-item p  { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

        /* ── TRENDS ── */
        .trends-block {
            background: rgba(79,142,247,0.07);
            border: 1px solid rgba(79,142,247,0.2);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
        }
        .trends-block .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 6px; }
        .trends-block p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

        /* ── SUGGESTION CARD ── */
        .suggestion-card {
            background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(34,197,94,0.03));
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 20px;
            animation: fadeUp 0.4s 0.1s ease both;
        }
        .suggestion-card .tag {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--green); margin-bottom: 8px;
        }
        .suggestion-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
        .suggestion-card p  { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
        .btn-directions {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--green);
            color: #000;
            font-weight: 700;
            font-size: 0.88rem;
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .btn-directions:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 18px var(--green-glow); }

        /* ── MAP CARD ── */
        .map-card { padding: 20px; }
        .map-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
        .map-card .map-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; }
        #map {
            width: 100%;
            height: 380px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .map-legend { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* ── CAB CARD ── */
        .section-header { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .cab-search { display: flex; gap: 10px; margin-bottom: 16px; }
        .cab-search input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 10px; padding: 11px 16px; color: var(--text);
            font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none;
            transition: border-color 0.2s;
        }
        .cab-search input:focus { border-color: var(--accent); }
        .cab-search button {
            background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3);
            color: var(--accent); border-radius: 10px; padding: 11px 20px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }
        .cab-search button:hover { background: rgba(79,142,247,0.25); }
        #cab-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        #cab-list li {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.9rem;
        }

        /* ── ERROR TOAST ── */
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--red);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">🏖️ Crowd<span>Clear</span> AI</div>
    <div class="user-dropdown-container" tabindex="0">
        <div class="nav-user">
            <div class="avatar" id="avatar-initials">?</div>
            <span id="welcome-text">Guest</span>
        </div>
        <div class="dropdown-menu">
            <button class="dropdown-item" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="hero">
    <h1>Goa, <span>Crowd-Free.</span><br>Always.</h1>
    <p>AI-powered real-time crowd intelligence for Goa's beaches & hotspots.</p>
    <div class="search-bar">
        <input type="text" id="place-input" placeholder="Enter a beach or spot (e.g. Baga Beach)" autocomplete="off">
        <button id="search-btn" onclick="checkCrowd()">
            <span id="btn-text">Search & Map</span>
        </button>
    </div>
</div>

<main>
    <!-- RESULT AREA -->
    <div id="result-area" style="display:none;"></div>

    <!-- MAP CARD -->
    <div id="map-card" class="card map-card" style="display:none;">
        <h3>📍 Live Location Map</h3>
        <p class="map-sub">Click any marker to get directions in Google Maps</p>
        <div id="map"></div>
        <div class="map-legend" id="map-legend"></div>
    </div>

    <!-- CAB BOOKING -->
    <div class="card">
        <div class="section-header">🚖 Local Cab Booking</div>
        <div class="cab-search">
            <input type="text" id="zone-input" placeholder="Enter zone (e.g., panjim, calangute)">
            <button onclick="findCabs()">Find Cabs</button>
        </div>
        <ul id="cab-list"></ul>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
