<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - CrowdClear AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0E14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #94a3b8;
            --accent: #22c55e; /* Driver Green */
            --accent-hover: #16a34a;
            --card-hover: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(34, 197, 94, 0.06), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(79, 142, 247, 0.04), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .header-box {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Profile Card */
        .profile-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
            background: rgba(0,0,0,0.4);
        }

        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: block;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Success Message */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(34, 197, 94, 0.9);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <span style="color: var(--accent);">🚖</span> Driver Portal
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-link">View Tourist Map</a>
            <button class="btn-link logout-btn" onclick="driverLogout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-box">
            <h1>My Profile</h1>
            <p class="subtitle">Update your active operating zones so tourists can find you.</p>
        </div>

        <div class="profile-card">
            <div class="form-group">
                <label>Phone Number (Your ID)</label>
                <input type="tel" id="prof-phone" disabled>
                <span class="help-text">Phone number cannot be changed.</span>
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="prof-name" placeholder="E.g. Ramesh K.">
            </div>

            <div class="form-group">
                <label>Operating Zones</label>
                <input type="text" id="prof-zone" placeholder="E.g. Panjim, Baga Beach, Calangute">
                <span class="help-text">Separate multiple areas with commas. These are the locations where tourists will be able to book you.</span>
            </div>

            <button class="btn-primary" onclick="updateProfile()" id="save-btn">Save Changes</button>
        </div>
    </div>

    <div class="toast" id="toast-msg">✅ Profile successfully updated!</div>

    <script src="driver_app.js"></script>
</body>
</html>
