<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gov Dashboard - CrowdClear AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0E14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #94a3b8;
            --accent: #ef4444; /* Gov Red Accent */
            --accent-hover: #dc2626;
            --high-crowd: #ef4444;
            --med-crowd: #f59e0b;
            --low-crowd: #22c55e;
            --card-hover: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(239, 68, 68, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.03), transparent 30%);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--accent);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-box {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Locations Table */
        .table-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--card-hover);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-high {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-low {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .suggestion-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.9rem;
        }

        .s-police { color: #fca5a5; }
        .s-clean { color: #86efac; }
        .s-neutral { color: var(--text-muted); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <span>🏛️</span> CrowdClear Admin
        </div>
        <button class="logout-btn" onclick="govLogout()">Secure Logout</button>
    </nav>

    <div class="container">
        <div class="header-box">
            <h1>Command Center</h1>
            <p class="subtitle">Live crowd analytics and resource deployment suggestions based on search volume.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Locations Tracked</div>
                <div class="stat-value" id="stat-locations">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Search Queries</div>
                <div class="stat-value" id="stat-searches">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">High Alert Zones</div>
                <div class="stat-value" style="color: var(--accent);" id="stat-alerts">--</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Location</th>
                        <th>Search Volume</th>
                        <th>Crowd Status</th>
                        <th>AI Deployment Suggestions</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body">
                    <tr>
                        <td colspan="4">
                            <div class="loading">
                                <div class="spinner"></div><br>
                                Fetching intelligence data...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="gov_app.js"></script>
</body>
</html>
